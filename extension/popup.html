<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 400px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
    }
    .header {
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 20px;
      margin-bottom: 5px;
    }
    .stats {
      padding: 20px;
      background: white;
    }
    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f9f9f9;
      margin: 10px 0;
      border-radius: 6px;
      border-left: 3px solid #ff6b6b;
    }
    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔐 Phishing Shield</h1>
    <p>Friction for Security</p>
  </div>

  <div class="stats">
    <div class="stat-item">
      <span>🔗 Links Analyzed</span>
      <span class="stat-value" id="analyzed">-</span>
    </div>
    <div class="stat-item">
      <span>🚨 Threats Detected</span>
      <span class="stat-value" id="detected">-</span>
    </div>
    <div class="stat-item">
      <span>📊 Detection Rate</span>
      <span class="stat-value" id="rate">-</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
